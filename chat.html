<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat — TrustFactON</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body{display:flex;flex-direction:column;min-height:100vh;}
    .chat-page{flex:1;background:linear-gradient(180deg,var(--navy-dark) 0%,var(--navy) 100%);padding:44px 0;}
    .chat-page h1{color:white;font-size:clamp(1.8rem,3vw,2.4rem);margin-bottom:10px;text-align:center;}
    .chat-page .sub{color:rgba(255,255,255,0.6);text-align:center;margin-bottom:28px;}
    .act-selector{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:28px;}
    .act-sel-btn{padding:6px 16px;border-radius:30px;border:1.5px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.65);font-size:0.8rem;cursor:pointer;transition:all 0.18s;font-family:var(--font-body);}
    .act-sel-btn:hover,.act-sel-btn.active{background:rgba(255,255,255,0.12);color:white;border-color:rgba(255,255,255,0.5);}
    .act-sel-btn.active{background:var(--green);border-color:var(--green);color:white;}
    .chat-full-wrap{max-width:820px;margin:0 auto;}
    .chat-full-header{background:var(--navy-dark);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;}
    .chat-full-header-left{display:flex;align-items:center;gap:12px;}
    .chat-full-messages{height:460px;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;background:var(--gray-50);}
    .chat-full-messages::-webkit-scrollbar{width:5px;}
    .chat-full-messages::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:4px;}
    .clear-btn{background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.6);padding:6px 12px;border-radius:6px;font-size:0.78rem;cursor:pointer;font-family:var(--font-body);transition:all 0.18s;}
    .clear-btn:hover{background:rgba(255,255,255,0.15);color:white;}
    .quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;padding:14px 16px;background:white;border-top:1px solid var(--gray-100);}
    .quick-btn{padding:10px 14px;border-radius:10px;border:1.5px solid var(--gray-200);background:white;font-size:0.78rem;color:var(--gray-600);cursor:pointer;text-align:left;font-family:var(--font-body);line-height:1.4;transition:all 0.18s;}
    .quick-btn:hover{border-color:var(--green);color:var(--navy);background:#F0FDF9;}
  </style>
</head>
<body>
<div id="nav-placeholder"></div>

<div class="chat-page">
  <div class="container">
    <h1>TrustFactON AI Assistant</h1>
    <p class="sub">Ask anything about Indian statutory law — free for all users, powered by Google Gemini</p>

    <!-- Act context selector -->
    <div class="act-selector">
      <button class="act-sel-btn active" data-act="">All Acts</button>
      <button class="act-sel-btn" data-act="Income Tax Act 1961 and IT Act 2025">📊 Income Tax</button>
      <button class="act-sel-btn" data-act="GST Act 2017">🏷️ GST</button>
      <button class="act-sel-btn" data-act="Companies Act 2013">🏢 Companies Act</button>
      <button class="act-sel-btn" data-act="FEMA 1999">💱 FEMA</button>
      <button class="act-sel-btn" data-act="Labour Laws and Labour Codes">👷 Labour Laws</button>
      <button class="act-sel-btn" data-act="SEBI Regulations">📈 SEBI</button>
      <button class="act-sel-btn" data-act="Insolvency and Bankruptcy Code 2016">⚖️ IBC</button>
    </div>

    <!-- Chat -->
    <div class="chat-container chat-full-wrap" id="chat-full">
      <div class="chat-full-header">
        <div class="chat-full-header-left">
          <div class="chat-avatar">TF</div>
          <div class="chat-header-info">
            <h4 style="color:white;font-size:0.95rem;font-family:var(--font-display)">TrustFactON AI</h4>
            <span style="font-size:0.78rem;color:rgba(255,255,255,0.6)"><span class="online-dot"></span>Context: <span id="ctx-label">All Indian Acts</span></span>
          </div>
        </div>
        <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
      </div>
      <div class="chat-full-messages"></div>

      <div class="quick-grid">
        <button class="quick-btn" onclick="sendQuick(this)">📊 New tax slabs FY 2025-26 under new regime</button>
        <button class="quick-btn" onclick="sendQuick(this)">🏷️ GST ITC eligibility conditions</button>
        <button class="quick-btn" onclick="sendQuick(this)">🏢 Companies Act AGM notice requirements</button>
        <button class="quick-btn" onclick="sendQuick(this)">💱 FDI automatic route — which sectors?</button>
        <button class="quick-btn" onclick="sendQuick(this)">👷 EPF contribution rates and applicability</button>
        <button class="quick-btn" onclick="sendQuick(this)">⚖️ CIRP timeline under IBC 2016</button>
      </div>

      <div class="chat-input-row">
        <textarea class="chat-input" rows="1" placeholder="Ask any question about Indian law..."></textarea>
        <button class="chat-send-btn"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </div>
    </div>

    <p style="text-align:center;font-size:0.76rem;color:rgba(255,255,255,0.3);margin-top:14px">For informational purposes only. Consult a qualified CA/CS/advocate for specific advice.</p>
  </div>
</div>

<div id="footer-placeholder"></div>
<script src="components.js"></script>
<script src="chat-widget.js"></script>
<script>
let currentCtx = '';
document.querySelectorAll('.act-sel-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.act-sel-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentCtx = btn.dataset.act;
    document.getElementById('ctx-label').textContent = currentCtx || 'All Indian Acts';
    if (window._tfChatFull) window._tfChatFull.actContext = currentCtx;
    showToast('Context: ' + (currentCtx || 'All Acts'));
  });
});
function clearChat() {
  const msgs = document.querySelector('.chat-full-messages');
  if (msgs) msgs.innerHTML = '';
  if (window._tfChatFull) { window._tfChatFull.history=[]; window._tfChatFull.addBotWelcome(); }
}
function sendQuick(btn) {
  const text = btn.textContent.replace(/^[^\s]+\s/,'').trim();
  const inp = document.querySelector('#chat-full .chat-input');
  if (inp && window._tfChatFull) { inp.value=text; window._tfChatFull.send(); }
}
</script>
</body>
</html>
