<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat — TrustFactON</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body{display:flex;flex-direction:column;min-height:100vh;}
    .chat-page{flex:1;background:var(--navy);padding:40px 0;}
    .chat-page h1{color:white;font-size:clamp(1.6rem,3vw,2.2rem);margin-bottom:8px;text-align:center;}
    .chat-page .sub{color:rgba(255,255,255,0.6);text-align:center;margin-bottom:24px;}
    .ctx-pills{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:24px;}
    .ctx-pill{padding:5px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.6);font-size:0.78rem;cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif;}
    .ctx-pill:hover{background:rgba(255,255,255,0.08);color:white;}
    .ctx-pill.active{background:var(--blue);border-color:var(--blue);color:white;}
    .chat-wrap{max-width:800px;margin:0 auto;}
    .chat-full-messages{height:440px;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;background:var(--gray-1);}
    .chat-full-messages::-webkit-scrollbar{width:4px;}
    .chat-full-messages::-webkit-scrollbar-thumb{background:var(--gray-3);border-radius:4px;}
    .chat-head-extra{display:flex;align-items:center;gap:8px;margin-left:auto;}
    .clear-btn{background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.6);padding:5px 12px;border-radius:6px;font-size:0.76rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;}
    .clear-btn:hover{background:rgba(255,255,255,0.15);color:white;}
    .ctx-label{font-size:0.72rem;color:rgba(255,255,255,0.45);}
    .quick-qs{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px;padding:10px 14px;background:white;border-top:1px solid var(--gray-3);}
    .qq{padding:8px 12px;border-radius:var(--radius);border:1px solid var(--gray-3);background:white;font-size:0.76rem;color:var(--gray-5);cursor:pointer;text-align:left;font-family:'Inter',sans-serif;line-height:1.4;transition:all 0.15s;}
    .qq:hover{border-color:var(--blue);color:var(--navy);background:var(--gray-1);}
  </style>
</head>
<body>
<div id="nav-placeholder"></div>

<div class="chat-page">
  <div class="container">
    <h1>AI Legal Assistant</h1>
    <p class="sub">Ask any question about Indian statutory law — free, no login, powered by Google Gemini</p>

    <div class="ctx-pills">
      <button class="ctx-pill active" data-act="">All Acts</button>
      <button class="ctx-pill" data-act="Income Tax Act 1961 and IT Act 2025">📊 Income Tax</button>
      <button class="ctx-pill" data-act="GST Act 2017">🏷️ GST</button>
      <button class="ctx-pill" data-act="Companies Act 2013">🏢 Companies Act</button>
    </div>

    <div class="chat-container chat-wrap" id="chat-full">
      <div class="chat-header">
        <div class="chat-avatar">TF</div>
        <div class="chat-header-info">
          <h4>TrustFactON AI</h4>
          <span class="ctx-label"><span class="online-dot"></span>Context: <span id="ctx-lbl">All Indian Acts</span></span>
        </div>
        <div class="chat-head-extra">
          <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
        </div>
      </div>
      <div class="chat-full-messages"></div>
      <div class="quick-qs">
        <button class="qq" onclick="sendQ(this)">New tax slabs FY 2025-26 under new regime</button>
        <button class="qq" onclick="sendQ(this)">GST ITC eligibility conditions</button>
        <button class="qq" onclick="sendQ(this)">Companies Act — AGM notice requirements</button>
        <button class="qq" onclick="sendQ(this)">TDS on salary — which form?</button>
        <button class="qq" onclick="sendQ(this)">GST registration threshold limit</button>
        <button class="qq" onclick="sendQ(this)">Director disqualification u/s 164</button>
      </div>
      <div class="chat-input-row">
        <textarea class="chat-input" rows="1" placeholder="Ask any question about Indian law..."></textarea>
        <button class="chat-send-btn"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </div>
    </div>
    <p style="text-align:center;font-size:0.74rem;color:rgba(255,255,255,0.25);margin-top:12px">Informational only. Not a substitute for professional legal advice.</p>
  </div>
</div>

<div id="footer-placeholder"></div>
<script src="components.js"></script>
<script src="chat-widget.js"></script>
<script>
let curCtx='';
document.querySelectorAll('.ctx-pill').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.ctx-pill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); curCtx=btn.dataset.act;
    document.getElementById('ctx-lbl').textContent=curCtx||'All Indian Acts';
    if(window._tfChatFull) window._tfChatFull.actContext=curCtx;
    showToast('Context: '+(curCtx||'All Acts'));
  });
});
function clearChat(){
  const m=document.querySelector('.chat-full-messages');
  if(m)m.innerHTML='';
  if(window._tfChatFull){window._tfChatFull.history=[];window._tfChatFull.addBotWelcome();}
}
function sendQ(btn){
  const t=btn.textContent.trim();
  const inp=document.querySelector('#chat-full .chat-input');
  if(inp&&window._tfChatFull){inp.value=t;window._tfChatFull.send();}
}
</script>
</body>
</html>
