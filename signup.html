<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9958699509806971"
         crossorigin="anonymous"></script>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="trustlogotrans.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — TrustFactON</title>
<link rel="stylesheet" href="style.css">
<style>
body{background:var(--gray-1);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 20px;}
.wrap{width:100%;max-width:400px;}
.logo{text-align:center;margin-bottom:24px;}
.logo img{width:46px;height:46px;object-fit:contain;mix-blend-mode:multiply;}
.logo-name{font-family:'Playfair Display',Georgia,serif;font-size:1.3rem;color:var(--navy);font-weight:700;margin-top:5px;}
.logo-name .accent{color:var(--blue);}
.card{background:white;border-radius:14px;border:1px solid var(--gray-3);padding:28px 28px 24px;box-shadow:0 4px 24px rgba(0,0,0,0.06);}
.card h2{font-size:1.15rem;color:var(--black);margin-bottom:4px;}
.card p{font-size:0.84rem;color:var(--gray-5);margin-bottom:22px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:0.79rem;font-weight:600;color:var(--gray-6);margin-bottom:5px;}
.fg input,.fg select{width:100%;padding:10px 12px;border:1.5px solid var(--gray-3);border-radius:8px;font-size:0.87rem;font-family:'Inter',sans-serif;color:var(--black);background:white;transition:border-color .15s,box-shadow .15s;box-sizing:border-box;}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.btn-full{width:100%;padding:11px;background:var(--navy);color:white;border:none;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s;margin-top:4px;}
.btn-full:hover{background:#0F2444;}
.btn-full:disabled{background:var(--gray-4);cursor:not-allowed;}
.err{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:9px 12px;font-size:0.81rem;color:#991B1B;margin-bottom:14px;display:none;}
.err.show{display:block;}
.foot{text-align:center;font-size:0.83rem;color:var(--gray-5);margin-top:16px;}
.foot a{color:var(--blue);font-weight:600;text-decoration:none;}
.back{text-align:center;margin-top:12px;font-size:0.8rem;}
.back a{color:var(--gray-4);text-decoration:none;}

/* OTP screen */
.otp-wrap{text-align:center;padding:4px 0;}
.otp-wrap h2{margin-bottom:6px;}
.otp-wrap p{font-size:0.84rem;color:var(--gray-5);margin-bottom:20px;line-height:1.6;}
#otpInput{width:100%;padding:13px;text-align:center;font-size:1.6rem;letter-spacing:8px;border:1.5px solid var(--gray-3);border-radius:8px;font-family:'Inter',sans-serif;box-sizing:border-box;color:var(--black);margin-bottom:12px;}
#otpInput:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.resend-btn{background:none;border:none;color:var(--blue);font-size:0.82rem;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;margin-top:12px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <img src="logo.png" alt="TrustFactON">
    <div class="logo-name">Trust<span class="accent">Fact</span>ON</div>
  </div>

  <div class="card" id="signupCard">
    <h2>Create your account</h2>
    <p>Free forever · No credit card · Takes 30 seconds</p>

    <div class="err" id="errMsg"></div>

    <div class="fg">
      <label>Your name</label>
      <input type="text" id="name" placeholder="Venkanna Setty" autocomplete="name">
    </div>
    <div class="fg">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"
             onkeydown="if(event.key==='Enter')doSignup()">
    </div>
    <div class="fg">
      <label>I am a</label>
      <select id="role">
        <option value="owner">Business Owner / Individual</option>
        <option value="professional">CA / CS / Tax Professional</option>
      </select>
    </div>

    <button class="btn-full" id="signupBtn" onclick="doSignup()">Get Started →</button>

    <div class="foot">Already have an account? <a href="login.html">Login →</a></div>
  </div>

  <!-- OTP screen — shown after email sent -->
  <div class="card" id="otpCard" style="display:none">
    <div class="otp-wrap">
      <div style="font-size:2rem;margin-bottom:12px">📬</div>
      <h2>Enter your code</h2>
      <p>We sent a login code to<br><strong id="sentTo" style="color:var(--black)"></strong></p>

      <div class="err" id="otpErr"></div>

      <input type="text" id="otpInput" placeholder="——————"
        maxlength="8" inputmode="numeric"
        oninput="this.value=this.value.replace(/[^0-9]/g,'')"
        onkeydown="if(event.key==='Enter')verifyOTP()">

      <button class="btn-full" id="verifyBtn" onclick="verifyOTP()">Verify & Continue →</button>
      <br>
      <button class="resend-btn" id="resendBtn" onclick="resendCode()">Resend code</button>
    </div>
  </div>

  <div class="back"><a href="index.html">← Back to TrustFactON</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
let pendingEmail = '';

(async () => {
  const { data:{ session } } = await sb.auth.getSession();
  if (session) window.location.href = 'dashboard.html';
})();

function showErr(msg, el='errMsg') {
  const e = document.getElementById(el);
  e.textContent = msg; e.classList.add('show');
}
function clearErr(el='errMsg') {
  document.getElementById(el).classList.remove('show');
}

async function doSignup() {
  const name  = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const role  = document.getElementById('role').value;
  clearErr();

  if (!name)  return showErr('Please enter your name.');
  if (!email) return showErr('Please enter your email address.');

  const btn = document.getElementById('signupBtn');
  btn.disabled = true; btn.textContent = 'Sending code…';

  // Store name + role for after verification
  localStorage.setItem('tf_signup', JSON.stringify({ name, role }));

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { shouldCreateUser: true, data: { name, role } }
  });

  if (error) {
    btn.disabled = false; btn.textContent = 'Get Started →';
    return showErr(error.message);
  }

  pendingEmail = email;
  document.getElementById('sentTo').textContent = email;
  document.getElementById('signupCard').style.display = 'none';
  document.getElementById('otpCard').style.display = 'block';
  setTimeout(() => document.getElementById('otpInput')?.focus(), 120);
}

async function verifyOTP() {
  const token = document.getElementById('otpInput').value.trim();
  const btn   = document.getElementById('verifyBtn');
  clearErr('otpErr');

  if (token.length < 6) return showErr('Enter the complete login code.', 'otpErr');

  btn.disabled = true; btn.textContent = 'Verifying…';

  const { data, error } = await sb.auth.verifyOtp({
    email: pendingEmail, token, type: 'email'
  });

  if (error) {
    btn.disabled = false; btn.textContent = 'Verify & Continue →';
    return showErr(
      error.message.includes('invalid') || error.message.includes('expired')
        ? 'Incorrect or expired code. Request a new one below.'
        : error.message,
      'otpErr'
    );
  }

  // Update profile with name + role from localStorage
  const saved = JSON.parse(localStorage.getItem('tf_signup') || '{}');
  if (saved.name) {
    await sb.from('profiles').upsert({
      id: data.user.id, name: saved.name, role: saved.role || 'owner'
    });
    // Professional users get primary_admin stored in localStorage
    // It's applied when their first entity is created in profile-setup
    if (saved.role === 'professional') {
      localStorage.setItem('tf_is_primary_admin', '1');
    }
  }
  localStorage.removeItem('tf_signup');

  // New user → go to profile setup
  // Returning user → go to dashboard
  window.location.href = 'profile-setup.html';
}

async function resendCode() {
  const btn = document.getElementById('resendBtn');
  btn.disabled = true; btn.textContent = 'Sending…';
  clearErr('otpErr');
  const { error } = await sb.auth.signInWithOtp({
    email: pendingEmail, options: { shouldCreateUser: true }
  });
  if (error) {
    showErr('Could not resend. Try again in a moment.', 'otpErr');
  } else {
    btn.textContent = '✅ New code sent!';
  }
  setTimeout(() => { btn.disabled = false; btn.textContent = 'Resend code'; }, 20000);
}
</script>
</body>
</html>
