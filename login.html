<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="trustlogotrans.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — TrustFactON</title>
<link rel="stylesheet" href="style.css">
<style>
body{background:var(--gray-1);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.wrap{width:100%;max-width:400px;}
.logo{text-align:center;margin-bottom:24px;}
.logo img{width:46px;height:46px;object-fit:contain;mix-blend-mode:multiply;}
.logo-name{font-family:'Playfair Display',Georgia,serif;font-size:1.3rem;color:var(--navy);font-weight:700;margin-top:5px;}
.logo-name .accent{color:var(--blue);}
.card{background:white;border-radius:14px;border:1px solid var(--gray-3);padding:28px;box-shadow:0 4px 24px rgba(0,0,0,.06);}
.card h2{font-size:1.15rem;color:var(--black);margin-bottom:4px;}
.card p{font-size:0.84rem;color:var(--gray-5);margin-bottom:22px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:0.79rem;font-weight:600;color:var(--gray-6);margin-bottom:5px;}
.fg input{width:100%;padding:10px 12px;border:1.5px solid var(--gray-3);border-radius:8px;font-size:0.87rem;font-family:'Inter',sans-serif;color:var(--black);background:white;transition:border-color .15s,box-shadow .15s;box-sizing:border-box;}
.fg input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.btn-full{width:100%;padding:11px;background:var(--navy);color:white;border:none;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s;}
.btn-full:hover{background:#0F2444;}
.btn-full:disabled{background:var(--gray-4);cursor:not-allowed;}
.err{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:9px 12px;font-size:0.81rem;color:#991B1B;margin-bottom:14px;display:none;}
.err.show{display:block;}
.foot{text-align:center;font-size:0.83rem;color:var(--gray-5);margin-top:16px;}
.foot a{color:var(--blue);font-weight:600;text-decoration:none;}
.back{text-align:center;margin-top:12px;font-size:0.8rem;}
.back a{color:var(--gray-4);text-decoration:none;}
/* OTP input */
#otpInput{width:100%;padding:13px;text-align:center;font-size:1.6rem;letter-spacing:8px;border:1.5px solid var(--gray-3);border-radius:8px;font-family:'Inter',sans-serif;box-sizing:border-box;color:var(--black);margin-bottom:12px;}
#otpInput:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.resend{background:none;border:none;color:var(--blue);font-size:0.82rem;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;display:block;margin:10px auto 0;}
.step-note{font-size:0.78rem;color:var(--gray-4);text-align:center;margin-top:10px;line-height:1.5;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <img src="logo.png" alt="TrustFactON">
    <div class="logo-name">Trust<span class="accent">Fact</span>ON</div>
  </div>

  <!-- Step 1: Email -->
  <div class="card" id="step1">
    <h2>Welcome back</h2>
    <p>Enter your email — we'll send a 6-digit login code</p>
    <div class="err" id="err1"></div>
    <div class="fg">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"
             onkeydown="if(event.key==='Enter')sendCode()">
    </div>
    <button class="btn-full" id="sendBtn" onclick="sendCode()">Send Login Code →</button>
    <div class="foot">New here? <a href="signup.html">Create account →</a></div>
  </div>

  <!-- Step 2: OTP -->
  <div class="card" id="step2" style="display:none">
    <h2>Enter your code</h2>
    <p style="margin-bottom:6px">Login code sent to<br><strong id="sentTo" style="color:var(--black)"></strong></p>
    <div class="err" id="err2"></div>
    <input type="text" id="otpInput" placeholder="——————"
      maxlength="8" inputmode="numeric"
      oninput="this.value=this.value.replace(/[^0-9]/g,'')"
      onkeydown="if(event.key==='Enter')verifyCode()">
    <button class="btn-full" id="verifyBtn" onclick="verifyCode()">Login →</button>
    <button class="resend" id="resendBtn" onclick="resendCode()">Resend code</button>
    <p class="step-note"><a href="#" onclick="document.getElementById('step1').style.display='block';document.getElementById('step2').style.display='none';" style="color:var(--gray-4)">← Use a different email</a></p>
  </div>

  <div class="back"><a href="index.html">← Back to TrustFactON</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
let pendingEmail = '';

(async () => {
  const { data:{ session } } = await sb.auth.getSession();
  if (session) window.location.href = 'dashboard.html';
})();

function showErr(msg, id) {
  const e = document.getElementById(id);
  e.textContent = msg; e.classList.add('show');
}
function clearErr(id) { document.getElementById(id).classList.remove('show'); }

async function sendCode() {
  const email = document.getElementById('email').value.trim();
  clearErr('err1');
  if (!email) return showErr('Please enter your email address.', 'err1');

  const btn = document.getElementById('sendBtn');
  btn.disabled = true; btn.textContent = 'Sending…';

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { shouldCreateUser: false }
  });

  if (error) {
    btn.disabled = false; btn.textContent = 'Send Login Code →';
    // If user doesn't exist, suggest signup
    const msg = error.message.includes('not found') || error.message.includes('Signups not allowed')
      ? 'No account found for this email. <a href="signup.html" style="color:var(--blue);font-weight:600">Create one →</a>'
      : error.message;
    document.getElementById('err1').innerHTML = msg;
    document.getElementById('err1').classList.add('show');
    return;
  }

  pendingEmail = email;
  document.getElementById('sentTo').textContent = email;
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
  setTimeout(() => document.getElementById('otpInput')?.focus(), 100);
}

async function verifyCode() {
  const token = document.getElementById('otpInput').value.trim();
  clearErr('err2');
  if (token.length < 6) return showErr('Enter the complete login code.', 'err2');

  const btn = document.getElementById('verifyBtn');
  btn.disabled = true; btn.textContent = 'Verifying…';

  const { error } = await sb.auth.verifyOtp({
    email: pendingEmail, token, type: 'email'
  });

  if (error) {
    btn.disabled = false; btn.textContent = 'Login →';
    showErr(
      error.message.includes('invalid') || error.message.includes('expired')
        ? 'Incorrect or expired code. Click Resend to get a new one.'
        : error.message,
      'err2'
    );
    return;
  }

  // Accept any pending staff/client invites for this email
  const { data: { user } } = await sb.auth.getUser();
  if (user) {
    try {
      await sb.rpc('accept_staff_invites', {
        p_user_id: user.id,
        p_email:   user.email,
      });
    } catch(e) { console.warn('accept_staff_invites:', e); }
  }

  // Smart redirect: professionals go to firm dashboard
  const profile = user ? await getProfile(user.id) : null;
  if (profile?.role === 'professional') {
    window.location.href = 'firm-dashboard.html';
  } else {
    window.location.href = 'dashboard.html';
  }
}

async function resendCode() {
  const btn = document.getElementById('resendBtn');
  btn.disabled = true; btn.textContent = 'Sending…';
  clearErr('err2');
  const { error } = await sb.auth.signInWithOtp({
    email: pendingEmail, options: { shouldCreateUser: false }
  });
  if (error) {
    showErr('Could not resend. Try again in a moment.', 'err2');
  } else {
    btn.textContent = '✅ New code sent!';
  }
  setTimeout(() => { btn.disabled = false; btn.textContent = 'Resend code'; }, 20000);
}
</script>
</body>
</html>
