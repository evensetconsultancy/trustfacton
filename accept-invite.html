<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accept Invitation — TrustFactON</title>
<link rel="stylesheet" href="style.css">
<style>
body{background:var(--gray-1);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.wrap{width:100%;max-width:420px;}
.logo{text-align:center;margin-bottom:24px;}
.logo img{width:46px;height:46px;object-fit:contain;mix-blend-mode:multiply;}
.logo-name{font-family:'Playfair Display',Georgia,serif;font-size:1.3rem;color:var(--navy);font-weight:700;margin-top:5px;}
.logo-name .accent{color:var(--blue);}
.card{background:white;border-radius:14px;border:1px solid var(--gray-3);padding:32px;box-shadow:0 4px 24px rgba(0,0,0,.06);}
.card h2{font-size:1.1rem;color:var(--black);margin-bottom:6px;}
.card p{font-size:0.84rem;color:var(--gray-5);margin-bottom:20px;line-height:1.55;}
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:0.79rem;font-weight:600;color:var(--gray-6);margin-bottom:5px;}
.fg input{width:100%;padding:10px 12px;border:1.5px solid var(--gray-3);border-radius:8px;font-size:0.87rem;font-family:'Inter',sans-serif;color:var(--black);background:white;box-sizing:border-box;}
.fg input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.btn-full{width:100%;padding:11px;background:var(--navy);color:white;border:none;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-full:hover{background:#0F2444;}
.btn-full:disabled{background:var(--gray-4);cursor:not-allowed;}
.err{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:9px 12px;font-size:0.81rem;color:#991B1B;margin-bottom:14px;display:none;}
.err.show{display:block;}
.badge{display:inline-flex;align-items:center;gap:6px;background:#EFF6FF;color:#1E40AF;border-radius:6px;padding:5px 10px;font-size:0.78rem;font-weight:600;margin-bottom:16px;}
.spin{border:3px solid #E2E8F0;border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.center{text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <img src="trustlogotrans.png" alt="TrustFactON">
    <div class="logo-name">Trust<span class="accent">Fact</span>ON</div>
  </div>

  <!-- Loading -->
  <div class="card center" id="stateLoading">
    <div class="spin" style="width:36px;height:36px;margin:0 auto 16px;"></div>
    <p style="margin:0;color:var(--gray-5);font-size:.88rem;">Verifying your invitation…</p>
  </div>

  <!-- Name form -->
  <div class="card" id="stateForm" style="display:none;">
    <div class="badge">✉️ Invitation Accepted</div>
    <h2>Welcome to TrustFactON!</h2>
    <p id="welcomeMsg">You've been invited to join a firm. Enter your name to complete setup.</p>
    <div class="err" id="formErr"></div>
    <div class="fg">
      <label>Your Full Name</label>
      <input type="text" id="nameInput" placeholder="e.g. Ravi Kumar"
        onkeydown="if(event.key==='Enter')completeSetup()">
    </div>
    <button class="btn-full" id="submitBtn" onclick="completeSetup()">Complete Setup →</button>
  </div>

  <!-- Error -->
  <div class="card center" id="stateError" style="display:none;">
    <div style="font-size:2rem;margin-bottom:12px;">⚠️</div>
    <h2 style="margin-bottom:8px;">Something went wrong</h2>
    <p id="errMsg" style="margin-bottom:18px;">This invitation link has expired or already been used.</p>
    <a href="login.html"
       style="display:block;padding:10px;background:var(--navy);color:white;border-radius:8px;text-decoration:none;font-weight:600;font-size:.88rem;">
      Go to Login →
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
let currentUser = null;
let inviteRole  = 'staff';

// ── Supabase JS v2 automatically detects and exchanges the token
// from the URL hash. We just listen for SIGNED_IN event.
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session && !currentUser) {
    currentUser = session.user;
    await handleAccept();
  }
});

// Also check for existing session (e.g. page refresh)
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session && !currentUser) {
    currentUser = session.user;
    await handleAccept();
  } else if (!session) {
    // Give onAuthStateChange 4 seconds to fire before showing error
    setTimeout(() => {
      if (!currentUser) {
        showError('This invitation link has expired or already been used. Please ask your firm admin to resend the invite.');
      }
    }, 4000);
  }
})();

async function handleAccept() {
  try {
    // Accept all pending invites for this email
    const { data: acceptedCount, error } = await sb.rpc('accept_staff_invites', {
      p_user_id: currentUser.id,
      p_email:   currentUser.email,
    });

    if (error) throw error;

    if (!acceptedCount || acceptedCount === 0) {
      // No pending invites — already accepted or direct login
      const profile = await getProfile(currentUser.id);
      if (profile?.name && profile.role) {
        // Already set up — redirect
        await redirect(profile.role);
      } else {
        showState('stateForm');
        setTimeout(() => document.getElementById('nameInput').focus(), 100);
      }
      return;
    }

    // Get the invite role so we redirect correctly
    const { data: myRow } = await sb
      .from('entity_members')
      .select('firm_role')
      .eq('user_id', currentUser.id)
      .eq('status', 'active')
      .limit(1)
      .maybeSingle();
    inviteRole = myRow?.firm_role || 'staff';

    // Check if profile already has a proper name
    const profile = await getProfile(currentUser.id);
    const hasName = profile?.name && profile.name !== currentUser.email.split('@')[0];

    if (hasName) {
      await redirect(inviteRole);
      return;
    }

    // Show name form
    const roleLabel = inviteRole === 'client' ? 'client' : 'staff member';
    document.getElementById('welcomeMsg').textContent =
      `You've been added as a ${roleLabel}. Enter your name to complete your account setup.`;
    showState('stateForm');
    setTimeout(() => document.getElementById('nameInput').focus(), 100);

  } catch(e) {
    console.error('handleAccept error:', e);
    showError('Something went wrong: ' + (e.message || 'Please try again.'));
  }
}

async function completeSetup() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) {
    const err = document.getElementById('formErr');
    err.textContent = 'Please enter your name.';
    err.classList.add('show');
    return;
  }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Setting up…';

  const { error } = await sb.from('profiles').upsert({
    id:   currentUser.id,
    name: name,
    role: inviteRole === 'client' ? 'owner' : 'professional',
  });

  if (error) {
    btn.disabled = false; btn.textContent = 'Complete Setup →';
    const err = document.getElementById('formErr');
    err.textContent = 'Error: ' + error.message;
    err.classList.add('show');
    return;
  }
  await redirect(inviteRole);
}

async function redirect(role) {
  window.location.href = (role === 'client') ? 'dashboard.html' : 'firm-dashboard.html';
}

function showState(id) {
  ['stateLoading','stateForm','stateError'].forEach(s => {
    document.getElementById(s).style.display = s === id ? '' : 'none';
  });
}

function showError(msg) {
  document.getElementById('errMsg').textContent = msg;
  showState('stateError');
}
</script>
</body>
</html>
